<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <clipPath id="circleClip"><circle cx="200" cy="200" r="195"/></clipPath>
  </defs>
  <!-- Outer red circle -->
  <circle cx="200" cy="200" r="200" fill="#d32f2f"/>
  <!-- White inner ring -->
  <circle cx="200" cy="200" r="160" fill="none" stroke="#fff" stroke-width="3"/>
  <!-- White inner fill -->
  <circle cx="200" cy="200" r="140" fill="#fff"/>
  
  <!-- Top curved text: ENGINEERING STUDENTS' ASSOCIATION -->
  <path id="topArc" d="M 40,200 A 160,160 0 0,1 360,200" fill="none"/>
  <text font-family="Arial, sans-serif" font-weight="bold" font-size="22" fill="#fff" letter-spacing="3">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">ENGINEERING STUDENTS' ASSOCIATION</textPath>
  </text>
  
  <!-- Bottom curved text: EGERTON -->
  <path id="bottomArc" d="M 360,200 A 160,160 0 0,1 40,200" fill="none"/>
  <text font-family="Arial, sans-serif" font-weight="bold" font-size="28" fill="#fff" letter-spacing="6">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">EGERTON</textPath>
  </text>
  
  <!-- Gear shape (simplified) -->
  <g transform="translate(200,170)">
    <!-- Main gear circle -->
    <circle cx="0" cy="0" r="55" fill="none" stroke="#c5841a" stroke-width="12"/>
    <!-- Gear teeth -->
    <g fill="#c5841a">
      <rect x="-6" y="-67" width="12" height="18" rx="2"/>
      <rect x="-6" y="-67" width="12" height="18" rx="2" transform="rotate(45)"/>
      <rect x="-6" y="-67" width="12" height="18" rx="2" transform="rotate(90)"/>
      <rect x="-6" y="-67" width="12" height="18" rx="2" transform="rotate(135)"/>
      <rect x="-6" y="-67" width="12" height="18" rx="2" transform="rotate(180)"/>
      <rect x="-6" y="-67" width="12" height="18" rx="2" transform="rotate(225)"/>
      <rect x="-6" y="-67" width="12" height="18" rx="2" transform="rotate(270)"/>
      <rect x="-6" y="-67" width="12" height="18" rx="2" transform="rotate(315)"/>
    </g>
    <!-- Inner gear -->
    <circle cx="0" cy="0" r="35" fill="#fff"/>
    <!-- Green accent -->
    <path d="M 10,-30 Q 30,0 10,30 L 25,30 Q 40,0 25,-30 Z" fill="#00843d"/>
    <!-- Wrench/tool icon -->
    <g fill="#333" transform="translate(-15,-15) scale(0.7)">
      <path d="M 30,0 L 45,25 L 40,30 L 20,10 Q 10,15 0,10 Q -5,5 0,0 Q 5,-5 10,0 Q 15,-5 20,-5 Z"/>
    </g>
  </g>
  
  <!-- EESA banner -->
  <rect x="115" y="220" width="170" height="42" rx="5" fill="#d32f2f"/>
  <text x="200" y="250" font-family="Arial, sans-serif" font-weight="900" font-size="32" fill="#fff" text-anchor="middle">EESA</text>
  
  <!-- Tagline -->
  <text x="200" y="282" font-family="Georgia, serif" font-style="italic" font-size="14" fill="#666" text-anchor="middle">Power of Technology</text>
</svg>