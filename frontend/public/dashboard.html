<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EESA — Unified Portal</title>
  <link rel="icon" type="image/svg+xml" href="/images/eesa-logo.svg">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#800020">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    .login-tabs{display:flex;gap:0;margin-bottom:20px;border-radius:var(--radius);overflow:hidden;border:1px solid var(--gray-200);}
    .login-tab{flex:1;padding:10px 0;border:none;background:var(--gray-100);color:var(--gray-600);cursor:pointer;font-weight:600;font-size:.88rem;transition:all .2s;}
    .login-tab.active{background:var(--primary);color:#fff;}
    .login-tab:hover:not(.active){background:var(--gray-200);}
    .login-role-form{display:none}.login-role-form.active{display:block}
    .sponsor-login-link{text-align:center;margin-top:14px;font-size:.82rem;color:var(--gray-500)}
    .sponsor-login-link a{color:var(--primary);text-decoration:underline}
  </style>
</head>
<body class="portal-page">

<!-- ====== UNIFIED LOGIN SCREEN ====== -->
<div id="loginScreen" class="admin-login-screen">
  <div class="login-card">
    <div class="login-header">
      <img src="/images/eesa-logo.svg" alt="EESA" class="login-logo">
      <h2>EESA Portal</h2>
      <p>Sign in to your account</p>
    </div>
    <div class="login-tabs">
      <button class="login-tab active" data-role="member" onclick="switchLoginTab('member')">Member</button>
      <button class="login-tab" data-role="admin" onclick="switchLoginTab('admin')">Admin</button>
      <button class="login-tab" data-role="lecturer" onclick="switchLoginTab('lecturer')">Lecturer</button>
      <button class="login-tab" data-role="sponsor" onclick="switchLoginTab('sponsor')">Sponsor</button>
    </div>
    <!-- Member Login -->
    <form class="login-role-form active" id="form-member" onsubmit="handleLogin(event,'member')">
      <div class="form-group"><label>Email</label><input type="email" id="mLoginEmail" required placeholder="you@students.egerton.ac.ke"></div>
      <div class="form-group"><label>Password</label><input type="password" id="mLoginPass" required></div>
      <button type="submit" class="btn btn-primary btn-block btn-lg"><i class="fas fa-sign-in-alt"></i> Sign In</button>
      <p style="margin-top:12px;text-align:center;font-size:.85rem;color:var(--gray-500);">New member? <a href="/?register=true">Register on main site</a></p>
    </form>
    <!-- Admin Login -->
    <form class="login-role-form" id="form-admin" onsubmit="handleLogin(event,'admin')">
      <div class="form-group"><label>Username</label><input type="text" id="aLoginUser" required placeholder="admin"></div>
      <div class="form-group"><label>Password</label><input type="password" id="aLoginPass" required></div>
      <button type="submit" class="btn btn-primary btn-block btn-lg"><i class="fas fa-sign-in-alt"></i> Sign In</button>
    </form>
    <!-- Lecturer Login -->
    <form class="login-role-form" id="form-lecturer" onsubmit="handleLogin(event,'lecturer')">
      <div class="form-group"><label>Email</label><input type="email" id="lLoginEmail" required placeholder="name@egerton.ac.ke"></div>
      <div class="form-group"><label>Password</label><input type="password" id="lLoginPass" required></div>
      <button type="submit" class="btn btn-primary btn-block btn-lg"><i class="fas fa-sign-in-alt"></i> Sign In</button>
      <p style="margin-top:12px;text-align:center;font-size:.85rem;color:var(--gray-500);">New lecturer? <a href="/lecturer">Register here</a></p>
    </form>
    <!-- Sponsor Login -->
    <form class="login-role-form" id="form-sponsor" onsubmit="handleLogin(event,'sponsor')">
      <div class="form-group"><label>Email</label><input type="email" id="sLoginEmail" required placeholder="contact@company.com"></div>
      <div class="form-group"><label>Password</label><input type="password" id="sLoginPass" required></div>
      <button type="submit" class="btn btn-primary btn-block btn-lg"><i class="fas fa-sign-in-alt"></i> Sign In</button>
    </form>
    <div id="loginError" class="form-error" style="margin-top:10px;"></div>
  </div>
</div>

<!-- ====== DASHBOARD SHELL ====== -->
<div id="dashboardShell" style="display:none;">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand">
        <img src="/images/eesa-logo.svg" alt="EESA" class="sidebar-logo">
        <span id="brandTitle">EESA Portal</span>
      </div>
      <button class="sidebar-close" onclick="toggleSidebar()"><i class="fas fa-times"></i></button>
    </div>
    <div class="sidebar-user" id="sidebarUser">
      <div class="user-avatar"><i class="fas fa-user-circle" id="userAvatarIcon"></i></div>
      <div class="user-info">
        <span class="user-name" id="userName">User</span>
        <span class="user-badge" id="userBadge">Active</span>
      </div>
    </div>
    <nav class="sidebar-nav" id="sidebarNav">
      <!-- Populated dynamically based on role -->
    </nav>
    <div class="sidebar-footer">
      <a href="/" class="nav-item"><i class="fas fa-globe"></i><span>Main Website</span></a>
      <a href="#" class="nav-item" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i><span>Sign Out</span></a>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content" id="mainContent">
    <header class="topbar">
      <button class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <h2 class="page-title" id="pageTitle">Dashboard</h2>
      <div class="topbar-actions">
        <div class="notification-bell" onclick="toggleNotifications()" id="notifBellWrap" style="display:none;">
          <i class="fas fa-bell"></i>
          <span class="notif-badge" id="notifBadge" style="display:none;">0</span>
        </div>
        <button class="dark-mode-toggle" onclick="toggleDarkMode()" title="Toggle dark mode" id="darkModeBtn">
          <i class="fas fa-moon" id="darkModeIcon"></i>
        </button>
        <span class="topbar-greeting" id="topbarGreeting">Welcome!</span>
      </div>
      <div class="notification-dropdown" id="notifDropdown" style="display:none;">
        <div class="notif-header"><h4>Notifications</h4><a href="#" onclick="markAllNotificationsRead()">Mark all read</a></div>
        <div class="notif-list" id="notifList"><div class="notif-empty">No notifications</div></div>
      </div>
    </header>
    <!-- Dynamic section container — populated by JS after login -->
    <div id="sectionContainer"></div>
  </main>
</div>

<div class="toast" id="toast"></div>
<script src="/js/dashboard.js"></script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('/service-worker.js');}</script>
</body>
</html>
